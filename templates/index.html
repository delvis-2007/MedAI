<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAI - Medical Assistant</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            width: 400px;
            background: #111827;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            margin-top: 0;
            font-size: 24px;
        }

        #chat {
            height: 350px;
            overflow-y: auto;
            background: #1f2937;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Scrollbar Styling */
        #chat::-webkit-scrollbar { width: 5px; }
        #chat::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }

        .msg {
            padding: 10px;
            border-radius: 8px;
            max-width: 85%;
            word-wrap: break-word;
            line-height: 1.4;
            white-space:pre-wrap;   /*Adds this line*/
        }

        .user {
            background: #1e40af;
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot {
            background: #334155;
            color: #34d399;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            display: flex;
            gap: 8px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #374151;
            color: white;
            outline: none;
        }

        input:focus {
            ring: 2px solid #38bdf8;
        }

        button {
            width: 80px;
            padding: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: #0f172a;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧠 MedAI</h1>

    <div id="chat">
        <div class="msg bot"><b>MedAI:</b> Welcome! Ask me any medical question.</div>
    </div>

    <div class="input-area">
        <input id="question" placeholder="Ask something..." onkeypress="if(event.key === 'Enter') askAI()">
        <button onclick="askAI()">Send</button>
    </div>
</div>

<script>
async function askAI() {
    const input = document.getElementById("question");
    const chat = document.getElementById("chat");
    const q = input.value.trim();

    if (!q) return;

    // Show User Message
    chat.innerHTML += `<div class="msg user"><b>You:</b> ${q}</div>`;
    input.value = "";
    chat.scrollTop = chat.scrollHeight;

    // Show Loading State
    const loadingId = "loading-" + Date.now();
    chat.innerHTML += `<div class="msg bot" id="${loadingId}"><b>MedAI:</b> Thinking...</div>`;
    chat.scrollTop = chat.scrollHeight;

    try {
        const response = await fetch("/ask", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ question: q })
        });

        const data = await response.json();

        // Update with AI reply
        document.getElementById(loadingId).innerHTML = `<b>MedAI:</b> ${data.answer}`;
    } catch (err) {
        document.getElementById(loadingId).innerHTML = `<b>MedAI:</b> Error: Could not reach the server.`;
    }

    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
